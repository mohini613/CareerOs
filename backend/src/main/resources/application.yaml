spring:
  application:
    name: careeros-backend
  
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  
  datasource:
    url: jdbc:postgresql://localhost:5432/careeros_db
    username: careeros_user
    password: careeros_password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: none 
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server: 
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# JWT Configuration
jwt:
  secret: careerOsSecretKeyForJwtTokenGenerationThatIsLongEnoughForHS256Algorithm
  expiration: 86400000  # 24 hours in milliseconds