# docker-compose.yml snippet
version: '3.9'
services:
  postgres:
    image: postgres:15
    container_name: careeros-postgres
    environment:
      POSTGRES_USER: careeros
      POSTGRES_PASSWORD: careeros
      POSTGRES_DB: careeros
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
